version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: factcheck-backend
    ports:
      - "8000:8000"
    environment:
      # Inject Gemini API key from local .env
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factcheck-frontend
    ports:
      - "3000:3000"
    environment:
      # Tell the Node server how to reach the Python backend within the Docker network
      - ADK_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
